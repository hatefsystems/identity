# sqlc configuration for the identity-api service.
#
# Per docs/architecture.md and docs/data-architecture.md §1, PostgreSQL access
# is strictly type-safe code generated by sqlc on top of the pgx/v5 driver;
# ORMs (e.g. GORM) are prohibited. sqlc reads the schema from db/migrations and
# the named queries from db/queries, emitting idiomatic Go into internal/db.
#
# Run with: `go tool sqlc generate` (or: nx sqlc-generate identity-api).
version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: db/queries
    gen:
      go:
        package: db
        out: internal/db
        sql_package: pgx/v5
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        emit_exact_table_names: false
        overrides:
          # Map PostgreSQL uuid columns to google/uuid rather than sqlc's
          # pgtype wrapper for ergonomic domain code.
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
        # Note: BYTEA columns (AES-GCM-256 envelope-encrypted PII payloads, see
        # data-architecture.md §2) already map to []byte by default under the
        # pgx/v5 driver, so no explicit override is required.
